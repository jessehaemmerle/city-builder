<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RETROPOLIS — 16-Bit City Builder</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%231a1a29'/><rect x='2' y='6' width='4' height='8' fill='%234f8fdc'/><rect x='7' y='3' width='4' height='11' fill='%23c9484f'/><rect x='12' y='8' width='3' height='6' fill='%23f0d95c'/></svg>">
</head>
<body>

<canvas id="game"></canvas>

<!-- Obere Statusleiste -->
<div id="topbar" class="panel">
  <div class="stat" id="uiMoney">€ 0</div>
  <div class="stat" id="uiPop">👤 0</div>
  <div class="stat" id="uiJobs">🛠 0</div>
  <div class="stat" id="uiHappy">🙂 50%</div>
  <div class="stat" id="uiPower">⚡ 0/0</div>
  <div class="stat" id="uiWater">🚰 0/0</div>
  <div class="stat" id="uiGarbage" title="Müll: Aufkommen / Kapazität">🗑 0/0</div>
  <div class="stat" id="uiHealth" title="Gesundheit / Kriminalität / Bildung">💚 0%</div>
  <div class="stat" id="uiEcon">➡</div>
  <div class="stat" id="uiDate">1. Jan 1990</div>

  <div id="rci" title="W / G / I">
    <div class="rciCol"><div class="rciBarWrap"><div class="rciBar r" id="rciR"></div></div><span>W</span></div>
    <div class="rciCol"><div class="rciBarWrap"><div class="rciBar c" id="rciC"></div></div><span>G</span></div>
    <div class="rciCol"><div class="rciBarWrap"><div class="rciBar i" id="rciI"></div></div><span>I</span></div>
  </div>

  <div class="group">
    <button class="btn spd" id="spd0" title="Pause">⏸</button>
    <button class="btn spd active" id="spd1">▶</button>
    <button class="btn spd" id="spd2">▶▶</button>
    <button class="btn spd" id="spd3">▶▶▶</button>
  </div>

  <div class="group">
    <button class="btn" id="btnUndo" title="Undo (Ctrl+Z)">↶</button>
    <button class="btn" id="btnRedo" title="Redo (Ctrl+Y)">↷</button>
  </div>

  <select id="overlaySel" class="btn">
    <option value="" data-i18n="ui.ovNormal"></option>
    <option value="power" data-i18n="ui.ovPower"></option>
    <option value="water" data-i18n="ui.ovWater"></option>
    <option value="garbage" data-i18n="ui.ovGarbage"></option>
    <option value="traffic" data-i18n="ui.ovTraffic"></option>
    <option value="lines" data-i18n="ui.ovLines"></option>
    <option value="landv" data-i18n="ui.ovLandv"></option>
    <option value="poll" data-i18n="ui.ovPoll"></option>
    <option value="police" data-i18n="ui.ovPolice"></option>
    <option value="fire" data-i18n="ui.ovFire"></option>
    <option value="school" data-i18n="ui.ovSchool"></option>
    <option value="health" data-i18n="ui.ovHealth"></option>
    <option value="park" data-i18n="ui.ovPark"></option>
    <option value="crime" data-i18n="ui.ovCrime"></option>
    <option value="districts" data-i18n="ui.ovDistricts"></option>
  </select>

  <div class="group">
    <button class="btn" id="btnTransit">🚏</button>
    <button class="btn" id="btnBbs" title="RETRO-NET BBS">📟</button>
    <button class="btn" id="btnCamera">📸</button>
    <button class="btn" id="btnResidents" title="Einwohner">👥</button>
    <button class="btn" id="btnDistricts" title="Bezirke">🗺️</button>
    <button class="btn" id="btnAlerts" title="Ereignisse">🔔</button>
    <button class="btn" id="btnAch" title="Erfolge">🏆</button>
    <button class="btn" id="btnStats">📈</button>
    <button class="btn" id="btnSfx">🔊</button>
    <button class="btn" id="btnMusic">🎵</button>
    <button class="btn" id="btnBudget">📒</button>
    <button class="btn" id="btnSave">💾</button>
    <button class="btn" id="btnMenu">☰</button>
  </div>
</div>

<!-- Werkzeugleiste -->
<div id="toolbar" class="panel"></div>

<!-- Info-Panel -->
<div id="infoPanel" class="panel hidden"></div>

<!-- Linienverwaltung (Seitenpanel, bleibt beim Stopp-Klicken offen) -->
<div id="transitPanel" class="panel hidden">
  <h3 data-i18n="tr.title"></h3>
  <div class="row"><span data-i18n="tr.new"></span>
    <button class="btn" id="btnNewBus" data-i18n="tr.bus"></button>
    <button class="btn" id="btnNewTrain" data-i18n="tr.train"></button>
    <button class="btn" id="btnNewSub" data-i18n="tr.sub"></button>
  </div>
  <div id="transitPickBar" class="hidden">
    <span id="transitPickText"></span>
    <button class="btn" id="btnPickDone" data-i18n="tr.pickDone"></button>
  </div>
  <div id="lineList"></div>
  <p id="transitHint" data-i18n="tr.hint"></p>
</div>

<!-- Touch-Bestätigung -->
<div id="touchConfirm" class="panel hidden">
  <button class="btn" id="btnTcOk"></button>
  <button class="btn" id="btnTcCancel"></button>
</div>

<!-- Budget & Optionen -->
<div id="budgetPanel" class="panel dialog hidden">
  <h2 data-i18n="ui.budget"></h2>
  <div id="budgetRows"></div>
  <div id="budgetStatus" class="cityStatus"></div>
  <div class="row" id="loanRow">
    <span id="debtLabel"></span>
    <span class="loanBtns">
      <button class="btn" id="btnLoan"></button>
      <button class="btn" id="btnRepay"></button>
    </span>
  </div>
  <h3 data-i18n="ui.policies" style="margin:8px 0 2px"></h3>
  <div id="policyList">
    <label class="row"><input type="checkbox" id="polSmokeDetect"> <span data-i18n="ui.pol.smokeDetect"></span><small data-i18n="ui.pol.smokeDetectTip"></small></label>
    <label class="row"><input type="checkbox" id="polRecycle"> <span data-i18n="ui.pol.recycle"></span><small data-i18n="ui.pol.recycleTip"></small></label>
    <label class="row"><input type="checkbox" id="polProBiz"> <span data-i18n="ui.pol.proBiz"></span><small data-i18n="ui.pol.proBizTip"></small></label>
    <label class="row"><input type="checkbox" id="polConserve"> <span data-i18n="ui.pol.conserve"></span><small data-i18n="ui.pol.conserveTip"></small></label>
    <label class="row"><input type="checkbox" id="polCulture"> <span data-i18n="ui.pol.culture"></span><small data-i18n="ui.pol.cultureTip"></small></label>
  </div>
  <h3 data-i18n="ui.funding" style="margin:8px 0 2px"></h3>
  <div id="fundingList">
    <label class="fundRow"><span data-i18n="t.police"></span> <b id="fundPoliceVal">100%</b><input type="range" id="fundPolice" min="50" max="150" value="100"></label>
    <label class="fundRow"><span data-i18n="t.firedep"></span> <b id="fundFireVal">100%</b><input type="range" id="fundFire" min="50" max="150" value="100"></label>
    <label class="fundRow"><span data-i18n="t.school"></span> <b id="fundSchoolVal">100%</b><input type="range" id="fundSchool" min="50" max="150" value="100"></label>
    <label class="fundRow"><span data-i18n="t.hospital"></span> <b id="fundHealthVal">100%</b><input type="range" id="fundHealth" min="50" max="150" value="100"></label>
    <label class="fundRow"><span data-i18n="t.park"></span> <b id="fundParkVal">100%</b><input type="range" id="fundPark" min="50" max="150" value="100"></label>
  </div>
  <label class="row"><span data-i18n="ui.tax"></span>: <b id="taxVal">9%</b>
    <input type="range" id="taxSlider" min="0" max="20" value="9">
  </label>
  <label class="row"><span data-i18n="ui.musicVol"></span>
    <input type="range" id="musicVol" min="0" max="100" value="50">
  </label>
  <label class="row"><span data-i18n="ui.sfxVol"></span>
    <input type="range" id="sfxVol" min="0" max="100" value="70">
  </label>
  <label class="row"><input type="checkbox" id="chkDisaster" checked> <span data-i18n="ui.disasters"></span></label>
  <label class="row"><input type="checkbox" id="chkNight" checked> <span data-i18n="ui.night"></span></label>
  <label class="row"><input type="checkbox" id="chkWeather" checked> <span data-i18n="ui.weather"></span></label>
  <label class="row"><input type="checkbox" id="chkCrt" checked> <span data-i18n="ui.crt"></span></label>
  <label class="row"><input type="checkbox" id="chkTouchConfirm"> <span data-i18n="ui.touchConfirm"></span></label>
  <label class="row"><span data-i18n="ui.lang"></span>
    <select id="langSel" class="btn">
      <option value="de">Deutsch</option>
      <option value="en">English</option>
    </select>
  </label>
  <div class="row right"><button class="btn" id="btnBudgetClose" data-i18n="ui.close"></button></div>
</div>

<!-- Statistik-Panel -->
<div id="statsPanel" class="panel dialog hidden">
  <h2 data-i18n="ui.stats"></h2>
  <div id="scenarioStatus"></div>
  <canvas id="statsCanvas" width="440" height="260"></canvas>
  <div id="statsDash" class="dashGrid"></div>
  <div class="row right"><button class="btn" id="btnStatsClose" data-i18n="ui.close"></button></div>
</div>

<!-- Einwohner-Panel -->
<div id="residentsPanel" class="panel dialog hidden">
  <h2 data-i18n="res.title"></h2>
  <div id="residentsList"></div>
  <div class="row right">
    <button class="btn" id="btnResidentsRefresh" data-i18n="res.refresh"></button>
    <button class="btn" id="btnResidentsClose" data-i18n="ui.close"></button>
  </div>
</div>

<!-- Bezirke -->
<div id="districtsPanel" class="panel dialog hidden">
  <h2 data-i18n="dist.title"></h2>
  <div id="districtsList"></div>
  <div class="row right"><button class="btn" id="btnDistrictsClose" data-i18n="ui.close"></button></div>
</div>

<!-- Ereignis-/Alarm-Panel -->
<div id="alertsPanel" class="panel dialog hidden">
  <h2 data-i18n="alerts.title"></h2>
  <div id="alertsList" class="resList"></div>
  <div class="row right"><button class="btn" id="btnAlertsClose" data-i18n="ui.close"></button></div>
</div>

<!-- Erfolge -->
<div id="achPanel" class="panel dialog hidden">
  <h2 data-i18n="ach.title"></h2>
  <div id="achList"></div>
  <div class="row right"><button class="btn" id="btnAchClose" data-i18n="ui.close"></button></div>
</div>

<!-- Berater -->
<div id="advisorBox" class="panel hidden">
  <canvas id="advisorFace" width="16" height="16"></canvas>
  <div>
    <div id="advisorName"></div>
    <div id="advisorText"></div>
  </div>
  <button class="btn" id="btnAdvisorOk">OK</button>
</div>

<!-- Minimap -->
<div id="minimapWrap" class="panel"><canvas id="minimap" width="128" height="128"></canvas></div>

<!-- Meldungen -->
<div id="toasts"></div>

<!-- Titelbildschirm -->
<div id="titleScreen">
  <div id="titleBox">
    <h1 id="logo">RETRO<span>POLIS</span></h1>
    <p class="subtitle">— 16-BIT CITY BUILDER —</p>
    <div id="titleButtons">
      <button class="btn big hidden" id="btnContinue" data-i18n="ui.continue"></button>
      <button class="btn big" id="btnNew" data-i18n="ui.new"></button>
      <button class="btn big" id="btnSlots" data-i18n="ui.slotsBtn"></button>
    </div>
    <p class="hint"><span data-i18n="ui.hint1"></span><br>
      <span data-i18n="ui.hint2"></span><br><br>
      <b data-i18n="ui.hint3"></b></p>
    <p class="credits">© 199X HAEMMERLE SOFT · PRESS START</p>
  </div>
</div>

<!-- Neues Spiel -->
<div id="newGamePanel" class="panel dialog hidden">
  <h2 data-i18n="ui.newGame"></h2>
  <div id="scenarioList"></div>
  <div class="row">
    <label><span data-i18n="ui.cityName"></span>: <input type="text" id="cityNameInput" maxlength="18" value="Retropolis"></label>
  </div>
  <div class="row" id="mapOpts">
    <label><span data-i18n="ui.size"></span>:
      <select id="sizeSel" class="btn">
        <option value="48" data-i18n="ui.sizeS"></option>
        <option value="64" selected data-i18n="ui.sizeM"></option>
        <option value="96" data-i18n="ui.sizeL"></option>
        <option value="256" data-i18n="ui.sizeXL"></option>
        <option value="512" data-i18n="ui.sizeXXL"></option>
        <option value="1024" data-i18n="ui.sizeMax"></option>
      </select>
    </label>
    <label><span data-i18n="ui.seed"></span>: <input type="text" id="seedInput" size="9"></label>
    <button class="btn" id="btnDice">🎲</button>
  </div>
  <div class="row" id="previewRow">
    <canvas id="mapPreview" width="192" height="192"></canvas>
    <span id="previewNote" data-i18n="ui.preview"></span>
  </div>
  <div class="row right">
    <button class="btn" id="btnNgCancel" data-i18n="ui.cancel"></button>
    <button class="btn" id="btnNgStart" data-i18n="ui.start"></button>
  </div>
</div>

<!-- Spielstände -->
<div id="slotsPanel" class="panel dialog hidden">
  <h2 data-i18n="ui.slots"></h2>
  <div id="slotList"></div>
  <div class="row"><input type="file" id="importFile" accept=".json" class="hidden">
    <button class="btn" id="btnImport" data-i18n="ui.import"></button>
  </div>
  <div class="row right"><button class="btn" id="btnSlotsClose" data-i18n="ui.close"></button></div>
</div>

<!-- Postkarte -->
<div id="postcardPanel" class="panel dialog hidden">
  <h2 data-i18n="ui.postcard"></h2>
  <img id="postcardImg" alt="Postkarte">
  <div class="row right">
    <button class="btn" id="btnPcSave" data-i18n="ui.pcSave"></button>
    <button class="btn" id="btnPcClose" data-i18n="ui.close"></button>
  </div>
</div>

<!-- RETRO-NET BBS -->
<div id="bbsPanel" class="hidden">
  <div id="bbsScreen">
    <div id="bbsHeader"></div>
    <div id="bbsBody"></div>
  </div>
</div>

<!-- CRT-Effekt -->
<div id="scanlines"></div>

<script src="js/balance.js"></script>
<script src="js/i18n.js"></script>
<script src="js/sprites.js"></script>
<script src="js/audio.js"></script>
<script src="js/sim.js"></script>
<script src="js/main.js"></script>
</body>
</html>
